# Phase 4: matched CA3 Pyramidal data + sim, hybrid (channel + voltage) loss.
#
# The training pack is generated by scripts/gen_ball_and_stick_data.py with
# --source-cell ca3_pyramidal, using the same jaxley cell that HybridLoss
# uses as its forward simulator.  With data and sim matched, the inverse
# problem is well-posed:
#
#   - 1 probe (soma)
#   - 1 stim (5k50kInterChaoticB)
#   - 6 unit_par columns (CA3_g_leak, CA3_gbar_na3, CA3_gkdrbar_kdr,
#                          CA3_gkabar_kap, CA3_gbar_km, CA3_gkdbar_kd)
#   - phys_par_range read from H5 meta.JSON.input_meta.phys_par_range
#
# Differences vs ballBBP_matched.hpar.yaml:
#   - cell_name_for_sim: ball_and_stick_bbp -> ca3_pyramidal
#   - outputSize_override: 12 -> 6 (CA3 has 6 trainable conductances)
#   - fp64: True -> False (CA3 fp32 was stable in the GPU bench, no NaNs)
#   - data_path -> ca3 synth dir

data_path:
  perlmutter: /pscratch/sd/k/ktub1999/synthetic_ca3_data/ca3_synth_v1/

data_conf:
    serialize_stims:  True
    append_stim:      False
    parallel_stim:    False
    num_data_workers: 4

max_epochs: 10
batch_size: 128

use_manual_features: False

const_local_batch: True
validation_period: [1, 1]

log_freq_per_epoch: 8
tb_show_graph: False

save_checkpoint: True
resume_checkpoint: False

do_ray: False
model_type: CNN

opt_pytorch:
    amp:       False
    apex:      False
    autotune:  False
    zerograd:  False

train_conf:
    warmup_epochs: 0
    optimizer: [adam, 0.0003]
    LRsched:   { plateau_patience: 2, reduceFactor: 0.3 }

# ─────────────────────────────────────────────────────────────────────────
# Hybrid (channel + voltage) loss
# ─────────────────────────────────────────────────────────────────────────
use_voltage_loss: True
voltage_loss:
    cell_name_for_sim: ca3_pyramidal
    channel_weight:    1.0          # ground-truth unit_par is in the H5
    voltage_weight:    1.0          # voltage as additional supervision
    mask_channels:     False        # NOT masked — true_unit is meaningful
    stim_name:         5k50kInterChaoticB
    soma_probe_index:  0            # synth pack: only [soma] -> idx 0
    clamp_unit_tanh:   True
    t_max_override:    auto         # = dt_stim × len(stim_csv); resolved at
                                    # criterion-build time so sim length
                                    # matches the stim waveform exactly.
    solver:            bwd_euler
    fp64:              False        # CA3 fp32 is stable (single-comp, 6 chan;
                                    # no backward NaNs at t_max=500 ms in
                                    # docs/ca3/gpu_bench.md).
    # phys_par_range omitted -> read from H5 meta.JSON.input_meta.phys_par_range
    # at criterion-build time.

model:
    myId:    ca3_matched
    comment: Phase 4 matched CA3 Pyramidal synth data + sim
    outputSize_override: 6
    num_cnn_blocks: 2
    conv_block:
        filter: [30, 90, 180]
        kernel: [4,  4,  4]
        pool:   [4,  4,  4]

    instance_norm_slot:  -9
    layer_norm:          False
    batch_norm_cnn_slot: 3
    batch_norm_flat:     True

    fc_block:
       dims:    [512, 512, 512, 256, 128]
       dropFrac: 0.04
