# Phase 3: matched ball_and_stick_bbp data + sim.
#
# The training pack at $SCRATCH/synthetic_bbp_data/ballBBP_synth_v1/
# (file: ball_and_stick_bbp_synth.mlPack1.h5) was generated by
# scripts/gen_ball_and_stick_data.py using the same `ball_and_stick_bbp`
# cell that HybridLoss uses as its forward simulator.  With data and sim
# matched, the inverse problem is well-posed and the channel-loss term is
# meaningful (we have ground-truth unit_par for every sample).
#
# Phase 2 -> Phase 3 deltas:
#   - data_path now points at the synth pack (1 probe, 1 stim, 12 params).
#   - voltage_loss.mask_channels: True -> False (use channel loss).
#   - voltage_loss.channel_weight: 0.0 -> 1.0  (channel + voltage hybrid).
#   - phys_par_range: dropped from inline list; Trainer/HybridLoss reads it
#     from meta.JSON.input_meta.phys_par_range in the H5 pack.
#   - SLR passes --probsSelect "0" (synth pack has only soma).

data_path:
  perlmutter: /pscratch/sd/k/ktub1999/synthetic_bbp_data/ballBBP_synth_v1/

data_conf:
    serialize_stims:  True
    append_stim:      False
    parallel_stim:    False
    num_data_workers: 4

max_epochs: 10
batch_size: 128

use_manual_features: False

const_local_batch: True
validation_period: [1, 1]

log_freq_per_epoch: 8
tb_show_graph: False        # graph trace would JIT jaxley a 2nd time

save_checkpoint: True
resume_checkpoint: False

do_ray: False
model_type: CNN

opt_pytorch:
    amp:       False
    apex:      False
    autotune:  False
    zerograd:  False

train_conf:
    warmup_epochs: 0
    optimizer: [adam, 0.0003]
    LRsched:   { plateau_patience: 2, reduceFactor: 0.3 }

# ─────────────────────────────────────────────────────────────────────────
# Hybrid (channel + voltage) loss
# ─────────────────────────────────────────────────────────────────────────
use_voltage_loss: True
voltage_loss:
    cell_name_for_sim: ball_and_stick_bbp
    channel_weight:    1.0          # use channel loss (we have ground-truth params)
    voltage_weight:    1.0          # voltage as additional supervision
    mask_channels:     False        # NOT masked — true_unit is meaningful
    stim_name:         5k50kInterChaoticB
    soma_probe_index:  0            # synth pack: only [soma] -> idx 0
    clamp_unit_tanh:   True         # squashes pred_unit to keep jaxley stable
    t_max_override:    auto         # = dt_stim × len(stim_csv); resolved at
                                    # criterion-build time so sim length
                                    # matches the stim waveform exactly.
    solver:            bwd_euler    # bwd_euler in fp64 is stable at 500 ms.
    fp64:              True         # fp32 NaN's at t_max ≥ 250 ms with BBP set.
                                    # Requires JAX_ENABLE_X64=true in the SLR env.
    # phys_par_range omitted -> read from H5 meta.JSON.input_meta.phys_par_range
    # at criterion-build time.

model:
    myId:    ballBBP_matched
    comment: Phase 3 matched ball_and_stick_bbp synth data + sim
    outputSize_override: 12          # data has 12 unit cols; explicit for safety
    num_cnn_blocks: 2
    conv_block:
        filter: [30, 90, 180]
        kernel: [4,  4,  4]
        pool:   [4,  4,  4]

    instance_norm_slot:  -9
    layer_norm:          False
    batch_norm_cnn_slot: 3
    batch_norm_flat:     True

    fc_block:
       dims:    [512, 512, 512, 256, 128]
       dropFrac: 0.04
